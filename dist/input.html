<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title></title>
<style>
  :root {
    --panel-bg: #F3F3F3;
    --border: rgba(0, 0, 0, 0.18);
    --footer-bg: #ECECEC;
    --title: #1C1C1C;
    --body: #383838;
    --input-bg: #FFFFFF;
    --input-border: #BDBDBD;
    --input-focus: #0067C0;
    --accent: #0067C0;
    --accent-hover: #1976D2;
    --accent-press: #005BA6;
    --secondary-bg: #FDFDFD;
    --secondary-hover: #F1F1F1;
    --secondary-border: #D0D0D0;
    --error: #C42B1C;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --panel-bg: #2B2B2B;
      --border: rgba(255, 255, 255, 0.12);
      --footer-bg: #242424;
      --title: #F5F5F5;
      --body: #D4D4D4;
      --input-bg: #1E1E1E;
      --input-border: #5A5A5A;
      --secondary-bg: #383838;
      --secondary-hover: #404040;
      --secondary-border: #5A5A5A;
    }
  }
  html, body {
    margin: 0; padding: 0;
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
    font-family: "Segoe UI Variable Text", "SF Pro Text", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 14px;
    color: var(--body);
    overflow: hidden;
  }
  .card {
    margin: 0;
    border-radius: 10px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .body-area {
    padding: 22px 28px 18px;
    -webkit-app-region: drag;
    app-region: drag;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 18px;
    font-weight: 600;
    color: var(--title);
  }
  p {
    margin: 0 0 14px;
    font-size: 14px;
    line-height: 1.5;
  }
  input[type=text] {
    -webkit-app-region: no-drag;
    app-region: no-drag;
    width: 100%;
    box-sizing: border-box;
    height: 36px;
    padding: 0 12px;
    font-size: 15px;
    font-family: inherit;
    color: var(--title);
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 5px;
    outline: none;
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  input[type=text]:focus {
    border-color: var(--input-focus);
    box-shadow: 0 0 0 2px rgba(0, 103, 192, 0.25);
  }
  input.invalid { border-color: var(--error); box-shadow: 0 0 0 2px rgba(196, 43, 28, 0.18); }
  .hint {
    margin-top: 6px;
    font-size: 12px;
    color: var(--error);
    min-height: 16px;
  }
  .footer {
    padding: 14px 24px;
    background: var(--footer-bg);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  button {
    -webkit-app-region: no-drag;
    app-region: no-drag;
    min-width: 96px;
    height: 34px;
    padding: 0 16px;
    border-radius: 5px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  button.primary {
    border: none;
    background: var(--accent);
    color: white;
    font-weight: 600;
  }
  button.primary:hover { background: var(--accent-hover); }
  button.primary:active { background: var(--accent-press); }
  button.secondary {
    border: 1px solid var(--secondary-border);
    background: var(--secondary-bg);
    color: var(--title);
  }
  button.secondary:hover { background: var(--secondary-hover); }
  button:focus { outline: 2px solid rgba(0, 103, 192, 0.4); outline-offset: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="body-area">
    <h1 id="title"></h1>
    <p id="prompt"></p>
    <input id="input" type="text" autocomplete="off" placeholder="HH:MM">
    <div id="hint" class="hint"></div>
  </div>
  <div class="footer">
    <button id="cancelBtn" class="secondary">取消</button>
    <button id="okBtn" class="primary">确定</button>
  </div>
</div>
<script>
  const params = new URLSearchParams(location.hash.replace(/^#/, ''));
  const title = params.get('title') || '';
  const prompt = params.get('prompt') || '';
  const def = params.get('default') || '';
  const label = params.get('label') || '';
  const validate = params.get('validate') || '';

  document.getElementById('title').textContent = title;
  document.getElementById('prompt').textContent = prompt;
  document.title = title;

  const inputEl = document.getElementById('input');
  const hintEl = document.getElementById('hint');
  inputEl.value = def;
  setTimeout(() => { inputEl.focus(); inputEl.select(); }, 0);

  const validateValue = (v) => {
    if (validate === 'hhmm') {
      const m = /^(\d{1,2}):(\d{2})$/.exec(v.trim());
      if (!m) return '格式不对，应为 HH:MM';
      const h = parseInt(m[1], 10), mm = parseInt(m[2], 10);
      if (h < 0 || h > 23) return '小时应在 0-23 之间';
      if (mm < 0 || mm > 59) return '分钟应在 0-59 之间';
      return '';
    }
    return '';
  };

  const tauri = window.__TAURI__;
  const invoke = tauri?.core?.invoke || tauri?.invoke;

  const close = async () => {
    try {
      if (invoke) { await invoke('close_dialog', { label }); return; }
    } catch (e) { console.error('close_dialog failed', e); }
    window.close();
  };

  const submit = async (value) => {
    try {
      if (invoke) await invoke('submit_input', { label, value });
    } catch (e) { console.error('submit_input failed', e); }
    close();
  };

  document.getElementById('okBtn').addEventListener('click', () => {
    const v = inputEl.value.trim();
    const err = validateValue(v);
    if (err) {
      hintEl.textContent = err;
      inputEl.classList.add('invalid');
      inputEl.focus();
      return;
    }
    let normalized = v;
    if (validate === 'hhmm') {
      const m = /^(\d{1,2}):(\d{2})$/.exec(v);
      normalized = String(parseInt(m[1], 10)).padStart(2, '0') + ':' + m[2];
    }
    submit(normalized);
  });

  document.getElementById('cancelBtn').addEventListener('click', close);

  inputEl.addEventListener('input', () => {
    inputEl.classList.remove('invalid');
    hintEl.textContent = '';
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { close(); }
    else if (e.key === 'Enter') { document.getElementById('okBtn').click(); }
  });
</script>
</body>
</html>
